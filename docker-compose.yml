services:
  postgres:
    image: postgres:17
    container_name: yu-postgres
    environment:
      POSTGRES_DB: yu
      POSTGRES_USER: yu
      POSTGRES_PASSWORD: yu
    ports:
      - "5432:5432"
    volumes:
      - yu-postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U yu -d yu"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  yu-postgres-data:
