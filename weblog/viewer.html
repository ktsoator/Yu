<!DOCTYPE html>
<html lang="zh">

<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Yu · 请求日志</title>
  <style>
    :root {
      --bg: #f7f5ef;
      --panel: #ffffff;
      --panel2: #f0ede5;
      --border: #dfd8ca;
      --fg: #1f211f;
      --muted: #747167;
      --accent: #b65a3c;
      --accent-soft: #f5e7df;
      --green: #587b5b;
      --red: #ad4438;
      --purple: #725b9f;
      --orange: #b17931;
      --blue: #4f6f91;
      --shadow: 0 10px 28px rgba(34, 32, 27, .06);
      --mono: "JetBrains Mono", "SF Mono", SFMono-Regular, Menlo, Consolas, monospace;
      --body: "Aptos", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
      --display: "Aptos Display", "Segoe UI", -apple-system, BlinkMacSystemFont, sans-serif;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      background: var(--bg);
      color: var(--fg);
      font: 14px/1.58 var(--body);
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    header {
      min-height: 58px;
      padding: 12px 22px;
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      gap: 12px;
      background: rgba(255, 255, 255, .9);
      z-index: 5;
    }

    header h1 {
      font-family: var(--display);
      font-size: 18px;
      margin: 0;
      font-weight: 700;
      white-space: nowrap;
    }

    header .hint {
      color: var(--muted);
      font-size: 12px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .actions {
      margin-left: auto;
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .btn {
      background: var(--accent);
      border: 1px solid var(--accent);
      color: #fff;
      padding: 7px 13px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 13px;
      font-weight: 600;
      font-family: var(--body);
      transition: background .14s ease, border-color .14s ease;
    }

    .btn:hover { background: #a73517; border-color: #a73517; }
    .btn.danger { background: #fff; border-color: #dc9d95; color: var(--red); }
    .btn.danger:hover { background: #f7ded7; border-color: var(--red); }

    main { flex: 1; display: flex; min-height: 0; }

    #list {
      width: 360px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      overflow-y: auto;
      background: var(--panel);
    }

    .item {
      padding: 12px 16px 13px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      border-left: 3px solid transparent;
      transition: background .14s ease, border-color .14s ease;
    }

    .item:hover { background: #f3ecde; }
    .item.active { background: var(--accent-soft); border-left-color: var(--accent); }

    .item .t { font-family: var(--mono); font-size: 11px; color: var(--muted); }
    .item .m { font-size: 13px; margin-top: 4px; font-weight: 600; display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .item .meta { font-size: 12px; color: var(--muted); margin-top: 3px; }

    #detail { flex: 1; overflow-y: auto; padding: 26px 32px 46px; }
    #empty {
      display: flex; align-items: center; justify-content: center;
      color: var(--muted); font-size: 15px; height: 70vh;
      border: 1px dashed var(--border); background: rgba(255, 255, 255, .5); border-radius: 10px;
    }

    .doc-hdr { display: flex; flex-wrap: wrap; gap: 8px 14px; align-items: baseline; margin-bottom: 22px; }
    .doc-hdr .model { font-family: var(--display); font-size: 22px; font-weight: 700; }
    .doc-hdr .sub { color: var(--muted); font-size: 13px; font-family: var(--mono); }

    .section { margin-bottom: 24px; }
    .section > h2 {
      font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
      color: var(--muted); margin: 0 0 12px; font-weight: 700; font-family: var(--mono);
    }

    .card {
      background: var(--panel); border: 1px solid var(--border);
      border-radius: 10px; padding: 14px 16px; box-shadow: var(--shadow); margin-bottom: 12px;
    }

    .card .role-line { display: flex; align-items: center; gap: 8px; margin-bottom: 9px; }

    .badge {
      display: inline-block; font-size: 11px; line-height: 1.35; padding: 2px 9px;
      border-radius: 999px; border: 1px solid var(--border); color: var(--muted);
      white-space: nowrap; background: var(--panel2); font-family: var(--mono); font-weight: 600;
    }
    .badge.role-user { color: var(--accent); border-color: #de9b86; background: var(--accent-soft); }
    .badge.role-assistant { color: var(--green); border-color: #9dbfb4; background: #e2f0ea; }
    .badge.role-system { color: var(--purple); border-color: #c1b2dd; background: #eee8f8; }
    .badge.role-tool { color: var(--orange); border-color: #d1a66c; background: #fbecd0; }
    .badge.err { color: var(--red); border-color: #dc9d95; background: #f7ded7; }

    .content { white-space: pre-wrap; word-break: break-word; font-size: 13px; color: #2d2923; }

    .reasoning {
      margin-top: 10px; padding: 9px 12px; border-left: 3px solid var(--orange);
      background: #fbecd0; border-radius: 6px; color: #7a5f2e; font-size: 12.5px;
      white-space: pre-wrap; word-break: break-word;
    }

    .toolcall {
      margin-top: 10px; background: var(--panel2); border: 1px solid var(--border);
      border-radius: 8px; padding: 9px 12px; font-family: var(--mono); font-size: 12.5px;
      white-space: pre-wrap; word-break: break-word;
    }
    .toolcall .name { color: var(--accent); font-weight: 700; }
    .toolcall .id { color: var(--muted); }

    .tool-def {
      background: var(--panel); border: 1px solid var(--border); border-radius: 10px;
      padding: 11px 14px; box-shadow: var(--shadow); margin-bottom: 10px;
    }
    .tool-def .name { font-family: var(--mono); color: var(--accent); font-weight: 700; }
    .tool-def .desc { color: var(--muted); }

    .errbox {
      background: #f7ded7; border: 1px solid var(--red); color: var(--red);
      border-radius: 10px; padding: 12px 14px; white-space: pre-wrap; font-size: 13px;
    }

    pre {
      background: var(--panel2); border: 1px solid var(--border); border-radius: 8px;
      padding: 12px 14px; overflow: auto; font-family: var(--mono); font-size: 12px;
      margin: 0; white-space: pre-wrap; word-break: break-word; max-height: 480px; color: #2d2923;
    }

    details > summary {
      cursor: pointer; list-style: none; color: var(--muted);
      font-family: var(--mono); font-size: 12px; font-weight: 600;
    }
    details > summary::-webkit-details-marker { display: none; }
    details > summary::before { content: "▸ "; }
    details[open] > summary::before { content: "▾ "; }
    details > summary { margin-bottom: 8px; }
  </style>
</head>

<body>
  <header>
    <h1>Yu 请求日志</h1>
    <span class="hint" id="count"></span>
    <div class="actions">
      <button class="btn danger" id="clear">清空</button>
      <button class="btn" id="refresh">刷新</button>
    </div>
  </header>
  <main>
    <div id="list"></div>
    <div id="detail">
      <div id="empty">← 选择一条记录查看请求与响应</div>
    </div>
  </main>

  <script>
    const $ = s => document.querySelector(s);
    let active = null;

    function esc(s) { return (s == null ? '' : String(s)).replace(/[&<>]/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;' }[c])); }

    async function loadList() {
      const logs = await (await fetch('/api/logs')).json();
      $('#count').textContent = logs.length + ' 条记录';
      const list = $('#list');
      list.innerHTML = '';
      if (!logs.length) { list.innerHTML = '<div class="item"><span class="t">暂无日志</span></div>'; return; }
      for (const l of logs) {
        const div = document.createElement('div');
        div.className = 'item' + (l.file === active ? ' active' : '');
        const time = l.time ? new Date(l.time).toLocaleString() : l.file;
        div.innerHTML = `<div class="t">${esc(time)}</div>
          <div class="m">${esc(l.model || '?')}${l.error ? '<span class="badge err">error</span>' : ''}</div>
          <div class="meta">${l.turns} 条消息 · ${l.tools} 个工具</div>`;
        div.onclick = () => openLog(l.file);
        list.appendChild(div);
      }
    }

    function showEmpty() {
      $('#detail').innerHTML = '<div id="empty">← 选择一条记录查看请求与响应</div>';
    }

    function roleCard(m) {
      let h = `<div class="card role-${esc(m.role)}"><div class="role-line"><span class="badge role-${esc(m.role)}">${esc(m.role)}</span>`;
      if (m.tool_call_id) h += `<span class="badge">↳ ${esc(m.tool_call_id)}</span>`;
      h += `</div>`;
      if (m.content) h += `<div class="content">${esc(m.content)}</div>`;
      if (m.reasoning) h += `<div class="reasoning">${esc(m.reasoning)}</div>`;
      for (const tc of (m.tool_calls || [])) {
        h += `<div class="toolcall"><span class="name">${esc(tc.name)}</span>(${esc(tc.arguments)}) <span class="id">#${esc(tc.id)}</span></div>`;
      }
      h += '</div>';
      return h;
    }

    async function openLog(file) {
      active = file;
      const rec = await (await fetch('/api/log?file=' + encodeURIComponent(file))).json();
      const time = rec.time ? new Date(rec.time).toLocaleString() : file;
      let h = `<div class="doc-hdr"><span class="model">${esc(rec.model)}</span>
        <span class="sub">${esc(time)}</span>
        <span class="sub">思考 ${rec.thinking ? '开' : '关'}</span>
        <span class="sub">${rec.duration_ms} ms</span></div>`;

      if (rec.error) h += `<div class="section"><h2>错误</h2><div class="errbox">${esc(rec.error)}</div></div>`;

      h += '<div class="section"><h2>响应</h2>' + roleCard(Object.assign({ role: 'assistant' }, rec.response)) + '</div>';

      const msgs = rec.request.messages || [];
      h += `<div class="section"><h2>请求 · ${msgs.length} 条消息</h2>`;
      for (const m of msgs) h += roleCard(m);
      h += '</div>';

      const tools = rec.request.tools || [];
      if (tools.length) {
        h += `<div class="section"><h2>工具定义 · ${tools.length}</h2>`;
        for (const t of tools) {
          h += `<div class="tool-def"><span class="name">${esc(t.name)}</span> — <span class="desc">${esc(t.description)}</span>
            <details><summary>参数 schema</summary><pre>${esc(JSON.stringify(t.parameters, null, 2))}</pre></details></div>`;
        }
        h += '</div>';
      }

      h += `<div class="section"><h2>原始 JSON</h2><details><summary>展开</summary><pre>${esc(JSON.stringify(rec, null, 2))}</pre></details></div>`;
      $('#detail').innerHTML = h;
      loadList();
    }

    $('#refresh').onclick = loadList;
    $('#clear').onclick = async () => {
      if (!confirm('确定要清空所有请求日志吗？')) return;
      await fetch('/api/logs/clear', { method: 'POST' });
      active = null;
      showEmpty();
      loadList();
    };
    loadList();
  </script>
</body>

</html>
